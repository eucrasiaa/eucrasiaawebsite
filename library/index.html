<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Music Library</title>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 2rem; }
        h1 { text-align: center; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; align-items: start; }
        .artist-header { grid-column: 1 / -1; font-size: 1.8rem; margin-top: 1.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid #45475a; color: #89b4fa; }
        .album-card { background: #313244; padding: 1rem; border-radius: 12px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: background 0.2s; }
        .album-card:hover { background: #45475a; }
        .cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 1rem; background: #181825; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .album-title { font-weight: bold; font-size: 1.1rem; margin: 0 0 0.5rem 0; word-break: break-word; }
        details { width: 100%; margin-top: 0.5rem; text-align: left; }
        summary { cursor: pointer; color: #a6adc8; font-weight: 600; outline: none; padding: 0.5rem 0; border-top: 1px solid #45475a; transition: color 0.2s; }
        summary:hover { color: #f38ba8; }
        .track-list { margin: 0; padding-left: 1.2rem; font-size: 0.85rem; color: #bac2de; max-height: 150px; overflow-y: auto; overflow-x: hidden; }
        .track-list li { margin-bottom: 0.3rem; padding-right: 0.5rem; list-style-type: decimal; }
        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-thumb { background: #585b70; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Digital Music Library</h1>
    <div id="library-container" class="grid"></div>

    <script>
        // Safely escape text to prevent HTML injection bugs
        const escapeHTML = str => str.replace(/[&<>'"]/g, 
            tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));

        // Fetch the JSON generated by Rust
        fetch('library.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('library-container');
                let html = '';

                // Loop through Artists
                for (const [artist, albums] of Object.entries(data.artists)) {
                    html += `<h2 class="artist-header">${escapeHTML(artist)}</h2>`;
                    
                    // Loop through Albums
                    for (const album of albums) {
                        // Use the extracted cover, or a fallback SVG
                        const imgSrc = album.cover_url ? album.cover_url : 
                            "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><rect width='300' height='300' fill='%23181825'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23585b70' font-family='sans-serif'>No Cover</text></svg>";

                        let tracksHtml = album.tracks.map(t => `<li>${escapeHTML(t.title)}</li>`).join('');

                        // Build the card. Notice loading="lazy" on the image!
                        html += `
                            <div class="album-card">
                                <img src="${imgSrc}" class="cover" alt="Cover Art" loading="lazy">
                                <h3 class="album-title">${escapeHTML(album.title)}</h3>
                                <details>
                                    <summary>View Tracks</summary>
                                    <ul class="track-list">${tracksHtml}</ul>
                                </details>
                            </div>
                        `;
                    }
                }
                container.innerHTML = html;
            })
            .catch(err => console.error('Failed to load library data:', err));
    </script>
</body>
</html>
