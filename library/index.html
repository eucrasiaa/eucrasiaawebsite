<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will's Library</title>
</head>
<style>
        body { 
            font-family: Verdana, Tahoma, sans-serif; 
            background-color: #1a1a1a; 
            color: #cccccc; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            font-weight: normal;
            letter-spacing: 1px;
            color: #ffffff;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            align-items: start; 
        }
        .artist-header { 
            grid-column: 1 / -1; 
            font-size: 22px; 
            margin-top: 30px; 
            padding-bottom: 5px; 
            border-bottom: 1px solid #666666; 
            color: #ffffff; 
        }
        .album-card { 
            background-color: #2b2b2b; 
            padding: 15px; 
            border: 1px solid #444444; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
        }
        .album-card:hover { 
            background-color: #333333; 
            border-color: #888888; 
        }
        .cover { 
            width: 100%; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            margin-bottom: 15px; 
            background-color: #111111; 
            border: 1px solid #000000; 
        }
        .album-title { 
            font-weight: bold; 
            font-size: 14px; 
            margin: 0 0 10px 0; 
            word-break: break-word; 
            color: #ffffff;
        }
        details { 
            width: 100%; 
            margin-top: 5px; 
            text-align: left; 
        }
        summary { 
            cursor: pointer; 
            color: #999999; 
            font-size: 12px;
            font-weight: bold; 
            outline: none; 
            padding: 5px 0; 
            border-top: 1px dotted #555555; 
        }
        summary:hover { 
            color: #ffffff; 
            text-decoration: underline; 
        }
        .track-list { 
            margin: 5px 0 0 0; 
            padding: 5px 5px 5px 25px; 
            font-size: 11px; 
            color: #bbbbbb; 
            max-height: 150px; 
            overflow-y: auto; 
            overflow-x: hidden; 
            background-color: #222222;
            border: 1px inset #555555;
        }
        .track-list li { 
            margin-bottom: 4px; 
            padding-right: 5px; 
            list-style-type: decimal; 
        }
</style>
<body>
    <h1>Will's Music</h1>
    <div id="library-container" class="grid"></div>

    <script>
        // Safely escape text to prevent HTML injection bugs
        const escapeHTML = str => str.replace(/[&<>'"]/g, 
            tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));

        // Fetch the JSON generated by Rust
        fetch('library.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('library-container');
                let html = '';

                // Loop through Artists
                for (const [artist, albums] of Object.entries(data.artists)) {
                    html += `<h2 class="artist-header">${escapeHTML(artist)}</h2>`;
                    
                    // Loop through Albums
                    for (const album of albums) {
                        // Use the extracted cover, or a fallback SVG
                        const imgSrc = album.cover_url ? album.cover_url : 
                            "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><rect width='300' height='300' fill='%23181825'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23585b70' font-family='sans-serif'>No Cover</text></svg>";

                        let tracksHtml = album.tracks.map(t => `<li>${escapeHTML(t.title)}</li>`).join('');

                        // Build the card. Notice loading="lazy" on the image!
                        html += `
                            <div class="album-card">
                                <img src="${imgSrc}" class="cover" alt="Cover Art" loading="lazy">
                                <h3 class="album-title">${escapeHTML(album.title)}</h3>
                                <details>
                                    <summary>View Tracks</summary>
                                    <ul class="track-list">${tracksHtml}</ul>
                                </details>
                            </div>
                        `;
                    }
                }
                container.innerHTML = html;
            })
            .catch(err => console.error('Failed to load library data:', err));
    </script>
</body>
</html>
